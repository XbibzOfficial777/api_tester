name: api_tester
description: A professional API testing tool with floating window support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  material_symbols_icons: ^4.2719.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  dio: ^5.4.0
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3
  get_it: ^7.6.4
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  file_picker: ^6.1.1
  permission_handler: ^11.3.0
  web_socket_channel: ^2.4.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  diff_match_patch: ^0.4.1
  jwt_decoder: ^2.0.1
  yaml: ^3.1.2
  collection: ^1.18.0
  crypto: ^3.0.3
  intl: ^0.19.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  clipboard: ^0.1.3
  flutter_svg: ^2.0.9
  connectivity_plus: ^5.0.2
  xml: ^6.5.0
  json_path: ^0.7.2
  json_schema: ^5.1.1
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.15.0
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9
  mocktail: ^1.0.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true