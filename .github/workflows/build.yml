name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Setup fonts
        run: |
          mkdir -p assets/fonts
          curl -sL "https://github.com/google/fonts/raw/main/ofl/inter/Inter%5Bwght%5D.ttf" -o assets/fonts/Inter-Variable.ttf || true
          if [ ! -f assets/fonts/Inter-Regular.ttf ]; then
            curl -sL "https://fonts.google.com/download?family=Inter" -o /tmp/inter.zip
            unzip -qo /tmp/inter.zip -d /tmp/inter_font
            cp /tmp/inter_font/static/Inter-Regular.ttf assets/fonts/ 2>/dev/null || true
            cp /tmp/inter_font/static/Inter-Medium.ttf assets/fonts/ 2>/dev/null || true
            cp /tmp/inter_font/static/Inter-SemiBold.ttf assets/fonts/ 2>/dev/null || true
            cp /tmp/inter_font/static/Inter-Bold.ttf assets/fonts/ 2>/dev/null || true
          fi
          # Fallback: remove font config if fonts unavailable
          if [ ! -f assets/fonts/Inter-Regular.ttf ]; then
            echo "Using system font fallback"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: api-tester-apk
          path: build/app/outputs/flutter-apk/app-release.apk