name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (first pass)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Regenerate Android project (v2 embedding)
        run: |
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml
          cp android/app/src/main/kotlin/com/api/tester/MainActivity.kt /tmp/MainActivity.kt
          cp android/app/src/main/res/values/strings.xml /tmp/strings.xml
          cp lib/main.dart /tmp/main.dart
          cp pubspec.yaml /tmp/pubspec.yaml
          rm -rf android/
          flutter create --platforms=android --org com.api.tester --project-name api_tester .
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/kotlin/com/api/tester/
          cp /tmp/MainActivity.kt android/app/src/main/kotlin/com/api/tester/MainActivity.kt
          cp /tmp/strings.xml android/app/src/main/res/values/strings.xml
          cp /tmp/main.dart lib/main.dart
          cp /tmp/pubspec.yaml pubspec.yaml

      - name: Patch compileSdk to 35
        run: |
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion 34/targetSdkVersion 35/' android/app/build.gradle

      - name: Get dependencies (after flutter create)
        run: flutter pub get

      - name: Generate code (second pass)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: api-tester-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error